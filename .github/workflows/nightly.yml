name: Nightly

# Push to `nightly` → build the Nightly channel and refresh a single rolling
# `nightly` pre-release. Lint gates the publish, so a red check never reaches
# testers' updater. The release title MUST contain "build <n>" — the Nightly
# updater parses it to order pre-releases (the tag is reused, so the version
# string can't). Mirrors Crisp/Porter nightly.yml.
on:
  workflow_dispatch:
  push:
    branches: [nightly]
    paths:
      - "VoiceInk/**"
      - "VoiceInk.xcodeproj/**"
      - "build.sh"
      - "make-dmg.sh"
      - "Makefile"
      - "LocalBuild.xcconfig"
      - ".swiftlint.yml"
      - ".github/workflows/nightly.yml"
      - ".github/scripts/**"

permissions:
  contents: read

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: false

jobs:
  lint:
    name: Quality (SwiftLint)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - run: brew install swiftlint
      - run: swiftlint --reporter github-actions-logging

  release:
    name: Build & publish nightly
    runs-on: macos-26
    needs: [lint]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # version is the commit count
      - name: Cache whisper.cpp framework
        uses: actions/cache@v4
        with:
          path: ~/VoiceInk-Dependencies
          key: whisper-xcframework-v1
      - name: Free disk space
        run: |
          df -h /
          sudo rm -rf /Library/Developer/CoreSimulator/Profiles/Runtimes/* 2>/dev/null || true
          sudo rm -rf ~/Library/Developer/CoreSimulator/Caches/* 2>/dev/null || true
          df -h /
      - name: Compute version
        run: echo "VERSION=0.$(git rev-list --count HEAD)" >> "$GITHUB_ENV"
      - name: Set up stable code-signing certificate
        env:
          MACOS_SIGN_CERT_P12: ${{ secrets.MACOS_SIGN_CERT_P12 }}
          MACOS_SIGN_CERT_PASSWORD: ${{ secrets.MACOS_SIGN_CERT_PASSWORD }}
        run: bash .github/scripts/setup-signing.sh
      - name: Build app and installer
        run: |
          export QUILL_CHANNEL=nightly
          export QUILL_VERSION="$VERSION"
          export QUILL_BUILD="${{ github.run_number }}"
          ./build.sh
          ./make-dmg.sh
      - name: Refresh rolling nightly pre-release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Reuse the single `nightly` tag/release. Clobber the asset, and set a
          # title carrying the build number the updater parses ("build <n>").
          TITLE="Quill Nightly $VERSION (build ${{ github.run_number }})"
          if gh release view nightly >/dev/null 2>&1; then
            gh release upload nightly build/Quill-Nightly.dmg --clobber
            gh release edit nightly --title "$TITLE" --prerelease --latest=false
          else
            gh release create nightly build/Quill-Nightly.dmg \
              --title "$TITLE" --prerelease --notes "Rolling nightly build." --target nightly
          fi

      # Sync the version-pinned `quill-nightly` cask to the DMG just shipped. The
      # nightly tag is rolling, so the cask version is the monotonic build number
      # (matches the "build <n>" release title). Needs the TAP_TOKEN secret; skips
      # with a warning if absent so a missing secret never fails the build.
      - name: Bump Homebrew cask (nightly)
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          if [ -z "${TAP_TOKEN:-}" ]; then
            echo "::warning::TAP_TOKEN not set — skipping nightly cask bump. Add a fine-grained PAT with Contents: Read & Write on rafay99-epic/homebrew-apps as the TAP_TOKEN secret to automate it."
            exit 0
          fi
          VERSION="${{ github.run_number }}" CASK=quill-nightly \
            bash .github/scripts/bump-cask.sh "$PWD/build/Quill-Nightly.dmg"
