name: CI

# Build + release in one pipeline so the build users receive is the exact one that
# passed lint. Lint is the gate: on `main` the release builds + publishes after it
# passes; on PRs the DMG builds + uploads as an artifact instead. Mirrors the
# Crisp/Porter CI shape, adapted to VoiceInk's Xcode project (builds via ./build.sh
# → xcodebuild + whisper.cpp, packages via ./make-dmg.sh).
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "VoiceInk/**"
      - "VoiceInk.xcodeproj/**"
      - "build.sh"
      - "make-dmg.sh"
      - "Makefile"
      - "LocalBuild.xcconfig"
      - ".swiftlint.yml"
      - ".github/workflows/ci.yml"
      - ".github/scripts/**"
  pull_request:
    paths:
      - "VoiceInk/**"
      - "VoiceInk.xcodeproj/**"
      - "build.sh"
      - "make-dmg.sh"
      - "Makefile"
      - "LocalBuild.xcconfig"
      - ".swiftlint.yml"
      - ".github/workflows/ci.yml"
      - ".github/scripts/**"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    name: Quality (SwiftLint)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Lint
        run: swiftlint --reporter github-actions-logging

  package:
    name: Build & package DMG
    if: github.event_name == 'pull_request'
    runs-on: macos-26
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      # whisper.xcframework is expensive to build and rarely changes — cache it.
      - name: Cache whisper.cpp framework
        uses: actions/cache@v4
        with:
          path: ~/.quill/Dependencies
          key: whisper-xcframework-v2
      - name: Free disk space
        run: |
          df -h /
          sudo rm -rf /Library/Developer/CoreSimulator/Profiles/Runtimes/* 2>/dev/null || true
          sudo rm -rf ~/Library/Developer/CoreSimulator/Caches/* 2>/dev/null || true
          df -h /
      # NOTE: deliberately NO code-signing step here. This job runs on
      # `pull_request`, where the PR branch (which can be edited in the PR) would
      # otherwise receive the signing secrets and could exfiltrate them. PR builds
      # are throwaway test artifacts, so ad-hoc signing is fine — stable signing only
      # happens in the `release` job, which runs on trusted pushes to `main`.
      - name: Build app and installer
        run: |
          ./build.sh
          ./make-dmg.sh
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: Quill-dmg
          path: build/Quill.dmg

  release:
    name: Build and publish release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: macos-26
    needs: [lint]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history — the version is the commit count
      - name: Cache whisper.cpp framework
        uses: actions/cache@v4
        with:
          path: ~/.quill/Dependencies
          key: whisper-xcframework-v2
      - name: Free disk space
        run: |
          df -h /
          sudo rm -rf /Library/Developer/CoreSimulator/Profiles/Runtimes/* 2>/dev/null || true
          sudo rm -rf ~/Library/Developer/CoreSimulator/Caches/* 2>/dev/null || true
          df -h /
      - name: Compute version
        run: echo "VERSION=0.$(git rev-list --count HEAD)" >> "$GITHUB_ENV"
      - name: Set up stable code-signing certificate
        env:
          MACOS_SIGN_CERT_P12: ${{ secrets.MACOS_SIGN_CERT_P12 }}
          MACOS_SIGN_CERT_PASSWORD: ${{ secrets.MACOS_SIGN_CERT_PASSWORD }}
        run: bash .github/scripts/setup-signing.sh
      - name: Build app and installer
        run: |
          export QUILL_VERSION="$VERSION"
          ./build.sh
          ./make-dmg.sh
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v$VERSION" build/Quill.dmg \
            --title "Quill $VERSION" --generate-notes

      # Keep the Homebrew cask in sync automatically — the stable `quill` cask is
      # version-pinned, so this pushes the new version + DMG sha256 to the tap.
      # Needs a TAP_TOKEN secret (fine-grained PAT with Contents: Read & Write on
      # rafay99-epic/homebrew-apps); skips with a warning if it's absent so a
      # missing secret never fails the release.
      - name: Bump Homebrew cask
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          if [ -z "${TAP_TOKEN:-}" ]; then
            echo "::warning::TAP_TOKEN not set — skipping cask bump. Add a fine-grained PAT with Contents: Read & Write on rafay99-epic/homebrew-apps as the TAP_TOKEN secret to automate it."
            exit 0
          fi
          VERSION="$VERSION" CASK=quill bash .github/scripts/bump-cask.sh "$PWD/build/Quill.dmg"
